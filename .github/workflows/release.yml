name: Release

on:
  push:
    tags:
      - "v*"
  # Deploy pushes release tags using the default GITHUB_TOKEN, and pushes
  # authenticated that way don't trigger other workflows (a deliberate
  # GitHub anti-recursion rule) — so the `push: tags` trigger above never
  # fires for automated tags. Deploy calls this dispatch instead.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
